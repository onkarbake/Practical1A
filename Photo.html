<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Styling Photo Gallery</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border: 4px solid #ddd;
            border-radius: 10px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            border-color: #555;
        }

        @media (max-width: 900px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <h1>Nature Photo Gallery</h1>

    <div class="gallery">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="Mountain">
        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" alt="Forest">
       
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" alt="Beach">
        <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e" alt="Sunset">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" alt="Waterfall">
    </div>

</body>
</html>
